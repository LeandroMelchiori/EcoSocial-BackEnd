spring.datasource.url=jdbc:h2:mem:forohub_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
app.ratelimit.enabled=false

catalogo.storage=local
catalogo.local.root=uploads-test

spring.flyway.enabled=false
api.security.secret=TEST_SECRET_123456789012345678901234567890

# ===== MinIO (para tests contra docker-compose) =====
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket=${MINIO_BUCKET:forohub}
